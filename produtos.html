<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Navegue pelo nosso catálogo completo de flores, buquês prontos, arranjos de mesa e cestas especiais de presente.">
  <title>Catálogo Bella Fioritura | Flores, Arranjos e Cestas</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Navigation Header (rendered by main.js) -->
  <header id="global-header"></header>

  <!-- Page Banner -->
  <section class="py-5" style="background: linear-gradient(135deg, rgba(24, 185, 68, 0.12) 0%, rgba(244, 232, 74, 0.18) 100%);">
    <div class="container text-center py-3">
      <h1 class="display-4 mb-2">Nosso Catálogo</h1>
      <p class="lead text-muted mb-0">Flores selecionadas prontas para encantar e presentear quem você ama.</p>
    </div>
  </section>

  <!-- Catalog Main Layout -->
  <main class="container py-5">
    <div class="row g-4">
      
      <!-- Filters Sidebar -->
      <aside class="col-lg-3">
        <div class="card border-0 shadow-sm p-4 sticky-lg-top" style="top: 105px; border-radius: 20px; background-color: var(--glass-bg);">
          <h2 class="h5 mb-3 text-dark">Filtrar Produtos</h2>
          <div style="width: 30px; height: 2px; background-color: var(--primary-floral); margin-bottom: 20px;"></div>
          
          <!-- Search input -->
          <div class="mb-4">
            <label for="search-input" class="form-label small fw-bold text-muted">Pesquisar</label>
            <div class="input-group">
              <input type="text" id="search-input" class="form-control form-control-sm border-secondary-subtle" placeholder="Ex: Rosas vermelhas..." style="border-radius: 30px 0 0 30px;">
              <button class="btn btn-premium btn-sm px-3" type="button" id="btn-search" style="border-radius: 0 30px 30px 0;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
              </button>
            </div>
          </div>
          
          <!-- Category list -->
          <div class="mb-4">
            <label class="form-label small fw-bold text-muted">Categorias</label>
            <div class="d-flex flex-column gap-2" id="categories-filter-group">
              <button type="button" class="btn btn-sm text-start py-2 px-3 rounded-pill filter-btn active" data-category="all" style="font-weight: 600;">
                ✿ Todas as Categorias
              </button>
            </div>
          </div>
          
          <!-- Sorting drop list -->
          <div>
            <label for="sort-select" class="form-label small fw-bold text-muted">Ordenar Por</label>
            <select id="sort-select" class="form-select form-select-sm border-secondary-subtle" style="border-radius: 20px;">
              <option value="default">Destaques</option>
              <option value="price-asc">Menor Preço</option>
              <option value="price-desc">Maior Preço</option>
              <option value="alphabetical">Nome (A - Z)</option>
            </select>
          </div>
        </div>
      </aside>
      
      <!-- Catalog Grid Column -->
      <section class="col-lg-9">
        <!-- Results stats and clear -->
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded-3 shadow-sm">
          <span class="text-muted small" id="catalog-count-text">Carregando catálogo...</span>
          <button type="button" class="btn btn-link btn-sm text-decoration-none text-muted p-0" id="btn-clear-filters" style="display: none;">Limpar Filtros</button>
        </div>
        
        <!-- Products Grid Container -->
        <div class="row g-4" id="catalog-products-container">
          <div class="col-12 text-center py-5">
            <div class="spinner-border text-secondary" role="status">
              <span class="visually-hidden">Carregando...</span>
            </div>
          </div>
        </div>
      </section>
      
    </div>
  </main>

  <!-- Navigation Footer (rendered by main.js) -->
  <footer id="global-footer"></footer>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Common Logic -->
  <script src="js/main.js"></script>
  
  <!-- Catalog Local Script -->
  <script src="js/produtos.js"></script>
</body>
</html>
